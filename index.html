<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Телепромптер</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#1e1e1e;display:flex;flex-direction:row;font-family:'Segoe UI',system-ui,sans-serif}

    #sidebar{width:280px;min-width:280px;background:#181818;border-right:.5px solid #2a2a2a;display:flex;flex-direction:column;padding:1.25rem 1rem;gap:8px;min-height:100vh;overflow-y:auto}
    #sidebar-label{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.08em;padding:0 4px;margin-bottom:4px}
    #sentences-list{display:flex;flex-direction:column;gap:8px}

    .s-item{background:#222;border:.5px solid #2e2e2e;border-radius:10px;padding:10px 12px;cursor:pointer;transition:border-color .15s,background .15s}
    .s-item:hover{background:#2a2a2a;border-color:#7ec8e3}
    .s-item.active{border-color:#7ec8e3;background:#1a2d33}
    .s-item.answered{border-left:2px solid #3a7a3a}
    .s-time{font-size:10px;color:#444;margin-bottom:4px}
    .s-text{font-size:12px;color:#888;line-height:1.4}
    .s-item.active .s-text{color:#bbb}

    #main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}

    #key-wrap{width:100%;max-width:900px;background:#282828;border:.5px solid #383838;border-radius:8px;padding:.75rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:10px}
    #key-label{font-size:11px;color:#777;text-transform:uppercase}
    #key-input{flex:1;background:transparent;border:none;outline:none;font-size:13px;color:#777;font-family:'Courier New',monospace}
    #key-save{background:transparent;border:1px solid #444;border-radius:6px;padding:5px 14px;font-size:12px;color:#888;cursor:pointer}

    #top{display:flex;align-items:center;gap:10px;margin-bottom:2rem;width:100%;max-width:900px}
    #dot{width:9px;height:9px;border-radius:50%;background:#333}
    #dot.listening{background:#00e5aa;box-shadow:0 0 8px #00e5aa88;animation:blink 1.8s infinite}
    #dot.thinking{background:#ffaa00;box-shadow:0 0 8px #ffaa0088;animation:blink .6s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
    #st{font-size:11px;color:#777;text-transform:uppercase}

    #mic-btn{margin-left:auto;border:none;color:white;padding:10px 22px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:.05em;transition:background .2s,box-shadow .2s,transform .15s}
    #mic-btn.on{background:#e53935;box-shadow:0 4px 14px rgba(229,57,53,.5)}
    #mic-btn.off{background:#555;box-shadow:none;color:#888}
    #mic-btn:hover{transform:scale(1.05)}

    #live-wrap{width:100%;max-width:900px;background:#282828;border:.5px solid #383838;border-radius:8px;padding:.75rem 1.25rem;margin-bottom:1.5rem;min-height:44px}
    #live-label{font-size:10px;color:#666;text-transform:uppercase;margin-bottom:4px}
    #live-txt{font-size:14px;color:#555;line-height:1.5;font-style:italic}

    #a-wrap{width:100%;max-width:1300px;background:#232323;border:.5px solid #303030;border-radius:14px;min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem;margin-bottom:1.5rem}
    #a-ph{font-size:15px;color:#444;text-align:center}
    #a-txt{font-size:clamp(22px,3.5vw,40px);color:#ececec;line-height:1.6;text-align:center;display:none}

    #detail-btn{display:none;margin:0 auto 1.5rem;background:transparent;border:1px solid #444;border-radius:8px;padding:9px 20px;font-size:13px;color:#777;cursor:pointer;transition:border-color .2s,color .2s}
    #detail-btn:hover{border-color:#888;color:#bbb}
    #note{font-size:11px;color:#252525;text-align:center}
    #err{margin-top:.75rem;font-size:12px;color:#c0392b;text-align:center}

    .kw{color:#7ec8e3;border-bottom:1px solid #7ec8e344;cursor:pointer;transition:color .15s;position:relative}
    .kw:hover{color:#aee0f5;border-bottom-color:#aee0f5}
    .kw-tooltip{display:none;position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#1a1a1a;border:.5px solid #3a3a3a;border-radius:10px;padding:10px 14px;min-width:200px;max-width:300px;z-index:100;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
    .kw-tooltip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#3a3a3a}
    .kw:hover .kw-tooltip{display:block}
    .kw-tooltip-row{font-size:12px;color:#aaa;padding:3px 0;white-space:nowrap}
    .kw-tooltip-loading{font-size:11px;color:#555;font-style:italic}
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-label">Усі речення</div>
  <div id="sentences-list"><div style="font-size:11px;color:#333;padding:4px">речення з'являться тут...</div></div>
</div>

<div id="main">
  <div id="key-wrap">
    <span id="key-label">Groq API key</span>
    <input id="key-input" type="password" placeholder="gsk_..." />
    <button id="key-save" onclick="saveKey()">зберегти</button>
  </div>

  <div id="top">
    <div id="dot"></div>
    <span id="st">введи ключ і збережи</span>
    <button id="mic-btn" class="on" onclick="toggleMic()">🎤 ON</button>
  </div>

  <div id="live-wrap">
    <div id="live-label">чую зараз</div>
    <div id="live-txt">—</div>
  </div>

  <div id="a-wrap">
    <div id="a-ph">натисни на речення щоб отримати відповідь...</div>
    <div id="a-txt"></div>
  </div>

  <button id="detail-btn" onclick="askDetail()">📖 розгорнута відповідь</button>
  <div id="note">made by miraldi</div>
  <div id="err"></div>
</div>

<script>
  let apiKey = localStorage.getItem('groq_key') || ''
  let micEnabled = false
  let mediaRecorder = null
  let audioStream = null
  let chunkInterval = null
  let waiting = false
  let lastQuestion = ''
  let sentences = []
  const tooltipCache = {}
  const CHUNK_MS = 4000  // записуємо по 4 секунди

  if (apiKey) {
    document.getElementById('key-input').value = apiKey
  }

  function saveKey() {
    apiKey = document.getElementById('key-input').value.trim()
    localStorage.setItem('groq_key', apiKey)
  }

  function setStatus(cls, txt) {
    document.getElementById('dot').className = cls
    document.getElementById('st').textContent = txt
  }

  function showErr(msg) {
    const el = document.getElementById('err')
    el.textContent = msg
    setTimeout(() => el.textContent = '', 5000)
  }

  // ── Whisper транскрипція ──────────────────────────────────────
  async function transcribeBlob(blob) {
    if (blob.size < 1000) return  // тихий чанк — пропускаємо
    const form = new FormData()
    form.append('file', blob, 'audio.webm')
    form.append('model', 'whisper-large-v3-turbo')
    form.append('language', 'uk')
    form.append('response_format', 'text')
    try {
      const r = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + apiKey },
        body: form
      })
      const text = (await r.text()).trim()
      if (text && text.length > 2) {
        document.getElementById('live-txt').textContent = text
        addSentence(text)
      }
    } catch(e) {
      showErr('помилка транскрипції')
    }
  }

  // ── Запис ────────────────────────────────────────────────────
  async function startListening() {
    if (!apiKey) { showErr('спочатку введи API ключ'); return }
    try {
      audioStream = await navigator.mediaDevices.getUserMedia({ audio: true })
    } catch(e) {
      setStatus('', 'немає доступу до мікрофона')
      showErr('дозволь доступ до мікрофона в браузері')
      return
    }

    setStatus('listening', 'слухаю...')

    function startChunk() {
      if (!micEnabled) return
      const chunks = []
      const mr = new MediaRecorder(audioStream)
      mediaRecorder = mr

      mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data) }
      mr.onstop = () => {
        const blob = new Blob(chunks, { type: mr.mimeType })
        transcribeBlob(blob)
        if (micEnabled) startChunk()  // відразу починаємо наступний чанк
      }

      mr.start()
      setTimeout(() => { if (mr.state === 'recording') mr.stop() }, CHUNK_MS)
    }

    startChunk()
  }

  function stopListening() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop()
    }
    if (audioStream) {
      audioStream.getTracks().forEach(t => t.stop())
      audioStream = null
    }
    mediaRecorder = null
  }

  // ── Список речень ────────────────────────────────────────────
  function addSentence(text) {
    const time = new Date().toLocaleTimeString('uk', {hour:'2-digit', minute:'2-digit'})
    sentences.unshift({ text, time, answered: false })
    if (sentences.length > 50) sentences.pop()
    renderSentences()
  }

  function renderSentences() {
    const list = document.getElementById('sentences-list')
    if (!sentences.length) {
      list.innerHTML = '<div style="font-size:11px;color:#333;padding:4px">речення з\'являться тут...</div>'
      return
    }
    list.innerHTML = sentences.map((s, i) => `
      <div class="s-item${i===0?' active':''}${s.answered?' answered':''}" onclick="selectSentence(${i})">
        <div class="s-time">${s.time}</div>
        <div class="s-text">${s.text}</div>
      </div>
    `).join('')
  }

  function selectSentence(i) {
    document.querySelectorAll('.s-item').forEach((el,j) => el.classList.toggle('active', j===i))
    const s = sentences[i]
    lastQuestion = s.text
    document.getElementById('live-txt').textContent = s.text
    askGroq(s.text, i)
  }

  // ── Tooltip ──────────────────────────────────────────────────
  async function fetchWordBadges(word, tooltipEl) {
    if (tooltipCache[word]) { tooltipEl.innerHTML = tooltipCache[word]; return }
    tooltipEl.innerHTML = '<span class="kw-tooltip-loading">шукаю...</span>'
    try {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile', max_tokens: 80,
          messages: [{
            role: 'system',
            content: 'Відповідай ТІЛЬКИ списком бейджів через | без пояснень. Вибери підходящі: ⚠️ Токсична речовина | ☠️ Летальна доза | 💊 Рецептурний препарат | 🧬 Біологічна молекула | ⚗️ Синтетична сполука | 🌿 Природного походження | 🏥 Використовується в медицині | 🚫 Заборонений препарат. Якщо жоден — відповідай: немає.'
          }, { role: 'user', content: word }]
        })
      })
      const data = await r.json()
      const ans = (data.choices?.[0]?.message?.content || '').trim()
      const html = (ans === 'немає' || !ans)
        ? '<span class="kw-tooltip-loading">без особливостей</span>'
        : ans.split('|').map(b => `<div class="kw-tooltip-row">${b.trim()}</div>`).join('')
      tooltipCache[word] = html
      tooltipEl.innerHTML = html
    } catch(e) {
      tooltipEl.innerHTML = '<span class="kw-tooltip-loading">помилка</span>'
    }
  }

  function showAnswer(txt) {
    document.getElementById('a-ph').style.display = 'none'
    const cleanTxt = txt.split('\n').filter(l => !l.startsWith('BADGES:')).join('\n').trim()
    const el = document.getElementById('a-txt')
    el.style.display = 'block'
    el.innerHTML = cleanTxt.replace(/\[\[(.+?)\]\]/g, (_, word) => {
      const url = 'https://uk.wikipedia.org/w/index.php?search=' + encodeURIComponent(word)
      return `<span class="kw" data-url="${url}" data-word="${word}">${word}<span class="kw-tooltip"><span class="kw-tooltip-loading">наведи щоб дізнатись</span></span></span>`
    })
    el.querySelectorAll('.kw').forEach(span => {
      let loaded = false
      span.addEventListener('mouseenter', () => {
        if (loaded) return; loaded = true
        fetchWordBadges(span.dataset.word, span.querySelector('.kw-tooltip'))
      })
      span.addEventListener('click', () => window.open(span.dataset.url, '_blank'))
    })
    document.getElementById('detail-btn').style.display = 'block'
  }

  async function askGroq(question, idx) {
    waiting = true
    setStatus('thinking', 'думаю...')
    try {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile', max_tokens: 300,
          messages: [{
            role: 'system',
            content: "Ти експерт з фармацевтичної хімії. Відповідай строго 2-3 речення українською. Без вступних слів. Одразу суть — коротко, точно. Ключові терміни обгортай у [[подвійні дужки]]."
          }, { role: 'user', content: question }]
        })
      })
      const data = await r.json()
      showAnswer(data.choices?.[0]?.message?.content || '...')
      if (idx !== undefined) {
        sentences[idx].answered = true
        renderSentences()
      }
    } catch(e) { showErr('помилка підключення') }
    waiting = false
    if (micEnabled) setStatus('listening', 'слухаю...')
    else setStatus('', 'пауза')
  }

  async function askDetail() {
    if (!lastQuestion) return
    waiting = true
    setStatus('thinking', 'думаю...')
    document.getElementById('detail-btn').style.display = 'none'
    try {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile', max_tokens: 800,
          messages: [{
            role: 'system',
            content: "Ти експерт з фармацевтичної хімії. Дай розгорнуту відповідь українською — 5-7 речень. Без зайвих вступів, одразу суть. Ключові терміни обгортай у [[подвійні дужки]]."
          }, { role: 'user', content: lastQuestion }]
        })
      })
      const data = await r.json()
      showAnswer(data.choices?.[0]?.message?.content || '...')
    } catch(e) { showErr('помилка підключення') }
    waiting = false
    if (micEnabled) setStatus('listening', 'слухаю...')
    else setStatus('', 'пауза')
  }

  function toggleMic() {
    micEnabled = !micEnabled
    const btn = document.getElementById('mic-btn')
    if (micEnabled) {
      btn.textContent = '🎤 ON'
      btn.className = 'on'
      startListening()
    } else {
      btn.textContent = '⏸ ПАУЗА'
      btn.className = 'off'
      setStatus('', 'пауза')
      stopListening()
    }
  }
</script>

</body>
</html>
