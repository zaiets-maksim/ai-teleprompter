<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI –Ґ–µ–ї–µ–њ—А–Њ–Љ–њ—В–µ—А</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #080808;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

#key-wrap {
  width: 100%; max-width: 860px;
  background: #111;
  border: 0.5px solid #222;
  border-radius: 8px;
  padding: 0.75rem 1.25rem;
  margin-bottom: 1.5rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
#key-label { font-size: 11px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; }
#key-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 13px; color: #777; font-family: 'Courier New', monospace;
}
#key-input::placeholder { color: #333; }
#key-save {
  background: transparent; border: 1px solid #2a2a2a; border-radius: 6px;
  padding: 5px 14px; font-size: 12px; color: #555; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
#key-save:hover { border-color: #444; color: #888; }
#key-save.saved { border-color: #00e5aa44; color: #00e5aa; }

#top {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 2rem; width: 100%; max-width: 860px;
}
#dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: #333; transition: all 0.3s; flex-shrink: 0;
}
#dot.listening { background: #00e5aa; box-shadow: 0 0 8px #00e5aa88; animation: blink 1.8s ease-in-out infinite; }
#dot.thinking  { background: #ffaa00; box-shadow: 0 0 8px #ffaa0088; animation: blink 0.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }
#st { font-size: 11px; color: #444; letter-spacing: 0.12em; text-transform: uppercase; }

#q-wrap {
  width: 100%; max-width: 860px;
  background: #111; border: 0.5px solid #1e1e1e; border-radius: 8px;
  padding: 0.75rem 1.25rem; margin-bottom: 1.5rem; min-height: 52px;
  transition: border-color 0.3s;
}
#q-wrap.lit { border-color: #00e5aa33; }
#q-label { font-size: 10px; color: #333; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; }
#q-txt { font-size: 14px; color: #555; line-height: 1.5; }

#a-wrap {
  width: 100%; max-width: 860px;
  background: #0d0d0d; border: 0.5px solid #181818; border-radius: 14px;
  min-height: 280px; display: flex; align-items: center; justify-content: center;
  padding: 2.5rem; margin-bottom: 1.5rem; transition: border-color 0.4s;
}
#a-wrap.lit { border-color: #1a3025; }
#a-ph { font-size: 15px; color: #1e1e1e; text-align: center; }
#a-txt {
  font-size: clamp(22px, 3.5vw, 40px); font-weight: 400; color: #ececec;
  line-height: 1.65; text-align: center; display: none; opacity: 0; transition: opacity 0.5s;
}
#a-txt.show { opacity: 1; }

#note { font-size: 11px; color: #252525; text-align: center; letter-spacing: 0.06em; width: 100%; max-width: 860px; }
#err { margin-top: 0.75rem; font-size: 12px; color: #c0392b; min-height: 16px; text-align: center; max-width: 860px; }
</style>
</head>
<body>

<div id="key-wrap">
  <span id="key-label">Groq API key</span>
  <input id="key-input" type="password" placeholder="gsk_..." spellcheck="false" />
  <button id="key-save" onclick="saveKey()">–Ј–±–µ—А–µ–≥—В–Є</button>
</div>

<div id="top">
  <div id="dot"></div>
  <span id="st">–≤–≤–µ–і–Є –Ї–ї—О—З —Ц –Ј–±–µ—А–µ–ґ–Є</span>
</div>

<div id="q-wrap">
  <div id="q-label">–њ–Є—В–∞–љ–љ—П</div>
  <div id="q-txt">вАФ</div>
</div>

<div id="a-wrap">
  <div id="a-ph">—З–µ–Ї–∞—О –љ–∞ –њ–Є—В–∞–љ–љ—П...</div>
  <div id="a-txt"></div>
</div>

<div id="note">–≤—Ц–і–њ–Њ–≤—Ц–і—Ц —В–∞ –љ–µ-–њ–Є—В–∞–љ–љ—П —Ц–≥–љ–Њ—А—Г—О—В—М—Б—П –∞–≤—В–Њ–Љ–∞—В–Є—З–љ–Њ</div>
<div id="err"></div>

<script>
const QUESTION_WORDS = /^(—Е—В–Њ|—Й–Њ|–і–µ|–Ї–Њ–ї–Є|—П–Ї|—З–Њ–Љ—Г|–љ–∞–≤—Ц—Й–Њ|—Б–Ї—Ц–ї—М–Ї–Є|—З–Є|—П–Ї–Є–є|—П–Ї–∞|—П–Ї–µ|—П–Ї—Ц|–Ї–Њ–Љ—Г|–Ї–Њ–≥–Њ|–Ї—Г–і–Є|–Ј–≤—Ц–і–Ї–Є|—А–Њ–Ј–Ї–∞–ґ–Є|–њ–Њ—П—Б–љ–Є|who|what|where|when|how|why|which|whose|whom|tell|explain|is|are|was|were|do|does|did|can|could|will|would|should|have|has)/i;

function isQuestion(text) {
  const t = text.trim();
  if (t.endsWith('?')) return true;
  if (QUESTION_WORDS.test(t)) return true;
  return false;
}

let apiKey = localStorage.getItem('groq_key') || '';
let rec = null;
let waiting = false; // true while waiting for AI response

if (apiKey) {
  document.getElementById('key-input').value = apiKey;
  document.getElementById('key-save').textContent = '–Ј–±–µ—А–µ–ґ–µ–љ–Њ вЬУ';
  document.getElementById('key-save').className = 'saved';
}

function saveKey() {
  apiKey = document.getElementById('key-input').value.trim();
  localStorage.setItem('groq_key', apiKey);
  const btn = document.getElementById('key-save');
  btn.textContent = '–Ј–±–µ—А–µ–ґ–µ–љ–Њ вЬУ';
  btn.className = 'saved';
  startListening();
}

function setStatus(dotCls, txt) {
  document.getElementById('dot').className = dotCls;
  document.getElementById('st').textContent = txt;
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  setTimeout(() => el.textContent = '', 5000);
}

function showAnswer(txt) {
  document.getElementById('a-ph').style.display = 'none';
  const el = document.getElementById('a-txt');
  el.style.display = 'block';
  el.classList.remove('show');
  el.textContent = txt;
  document.getElementById('a-wrap').classList.add('lit');
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
}

async function askGroq(question) {
  waiting = true;
  setStatus('thinking', '–і—Г–Љ–∞—О...');
  try {
    const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + apiKey
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 300,
        messages: [
          { role: 'system', content: '–Ґ–Є –µ–Ї—Б–њ–µ—А—В –Ј —Д–∞—А–Љ–∞—Ж–µ–≤—В–Є—З–љ–Њ—Ч —Е—Ц–Љ—Ц—Ч —В–∞ —Д–∞—А–Љ–∞–Ї–Њ–ї–Њ–≥—Ц—Ч. –Т—Ц–і–њ–Њ–≤—Ц–і–∞–є —П–Ї —Д–∞—Е—Ц–≤–µ—Ж—М вАФ —В–Њ—З–љ–Њ, –њ–Њ —Б—Г—В—Ц, –Ґ–Ж–Ы–ђ–Ъ–Ш —Г–Ї—А–∞—Ч–љ—Б—М–Ї–Њ—О –Љ–Њ–≤–Њ—О. –Т–Є–Ї–Њ—А–Є—Б—В–Њ–≤—Г–є –≤–Є–Ї–ї—О—З–љ–Њ —Г–Ї—А–∞—Ч–љ—Б—М–Ї—Ц —В–∞ –ї–∞—В–Є–љ—Б—М–Ї—Ц —Б–Є–Љ–≤–Њ–ї–Є. –Ц–Њ–і–љ–Є—Е —Ц—Ф—А–Њ–≥–ї—Ц—Д—Ц–≤, –Ї–Є—В–∞–є—Б—М–Ї–Є—Е, —П–њ–Њ–љ—Б—М–Ї–Є—Е –∞–±–Њ –±—Г–і—М-—П–Ї–Є—Е —Ц–љ—И–Є—Е –љ–µ–Ј—А–Њ–Ј—Г–Љ—Ц–ї–Є—Е —Б–Є–Љ–≤–Њ–ї—Ц–≤. –С–µ–Ј —Б–њ–Є—Б–Ї—Ц–≤, –±–µ–Ј –Ј—Ц—А–Њ—З–Њ–Ї, –±–µ–Ј —Д–Њ—А–Љ–∞—В—Г–≤–∞–љ–љ—П вАФ –ї–Є—И–µ —З–Є—Б—В–Є–є —В–µ–Ї—Б—В –і–ї—П —З–Є—В–∞–љ–љ—П –≤–≥–Њ–ї–Њ—Б. –Ь–∞–Ї—Б–Є–Љ—Г–Љ 2-3 —А–µ—З–µ–љ–љ—П.' },
          { role: 'user', content: question }
        ]
      })
    });
    const data = await r.json();
    if (data.error) showErr('–Я–Њ–Љ–Є–ї–Ї–∞: ' + data.error.message);
    else {
      let ans = data.choices?.[0]?.message?.content || '...';
      // –Т–Є–і–∞–ї—П—Ф–Љ–Њ —Ц—Ф—А–Њ–≥–ї—Ц—Д–Є —В–∞ —Ц–љ—И—Ц –љ–µ-–Ї–Є—А–Є–ї–Є—З–љ—Ц/–љ–µ-–ї–∞—В–Є–љ—Б—М–Ї—Ц —Б–Є–Љ–≤–Њ–ї–Є
      ans = ans.replace(/[\u3000-\u9fff\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g, '').trim();
      showAnswer(ans);
    }
  } catch(e) {
    showErr('–Я–Њ–Љ–Є–ї–Ї–∞ –њ—Ц–і–Ї–ї—О—З–µ–љ–љ—П');
  }
  waiting = false;
  setStatus('listening', '—Б–ї—Г—Е–∞—О...');
}

function startListening() {
  if (!apiKey) return;
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('', '–њ–Њ—В—А—Ц–±–µ–љ Chrome'); return; }

  rec = new SR();
  rec.lang = 'uk-UA';
  rec.interimResults = true;
  rec.continuous = true; // вЖР —Б–ї—Г—Е–∞—Ф –±–µ–Ј –њ–µ—А–µ—А–≤, –і–Њ–Ј–≤—Ц–ї —В—Ц–ї—М–Ї–Є –Њ–і–Є–љ —А–∞–Ј

  let currentInterim = '';

  rec.onstart = () => setStatus('listening', '—Б–ї—Г—Е–∞—О...');

  rec.onresult = e => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        // –Ю—В—А–Є–Љ–∞–ї–Є —Д—Ц–љ–∞–ї—М–љ—Г —Д—А–∞–Ј—Г
        if (!waiting) {
          document.getElementById('q-txt').textContent = t.trim();
          document.getElementById('q-wrap').classList.add('lit');
          askGroq(t.trim());
        } else if (false) {
          document.getElementById('q-txt').textContent = 'вАФ (–љ–µ –њ–Є—В–∞–љ–љ—П)';
          document.getElementById('q-wrap').classList.remove('lit');
        }
        currentInterim = '';
      } else {
        interim += t;
      }
    }
    if (interim) {
      currentInterim = interim;
      document.getElementById('q-txt').textContent = interim;
      document.getElementById('q-wrap').classList.add('lit');
    }
  };

  rec.onerror = e => {
    if (e.error === 'no-speech') return; // –љ–Њ—А–Љ–∞–ї—М–љ–Њ, –њ—А–Њ–і–Њ–≤–ґ—Г—Ф–Љ–Њ
    showErr('–Я–Њ–Љ–Є–ї–Ї–∞: ' + e.error);
  };

  rec.onend = () => {
    // –Я–µ—А–µ–Ј–∞–њ—Г—Б–Ї–∞—Ф–Љ–Њ —В–Њ–є —Б–∞–Љ–Є–є –Њ–±'—Ф–Ї—В вАФ –±–µ–Ј –љ–Њ–≤–Њ–≥–Њ –Ј–∞–њ–Є—В—Г –і–Њ–Ј–≤–Њ–ї—Г
    if (apiKey) setTimeout(() => { try { rec.start(); } catch(e) {} }, 300);
  };

  rec.start();
}

if (apiKey) startListening();
</script>
</body>
</html>
