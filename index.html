<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Телепромптер</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    
    body{
    min-height:100vh;
    background:#1e1e1e;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:2rem;
    font-family:'Segoe UI',system-ui,sans-serif
    }
    
    #key-wrap{
    width:100%;max-width:860px;
    background:#282828;
    border:.5px solid #383838;
    border-radius:8px;
    padding:.75rem 1.25rem;
    margin-bottom:1.5rem;
    display:flex;
    align-items:center;
    gap:10px
    }
    
    #key-label{font-size:11px;color:#777;text-transform:uppercase}
    #key-input{
    flex:1;background:transparent;border:none;outline:none;
    font-size:13px;color:#777;font-family:'Courier New',monospace
    }
    
    #key-save{
    background:transparent;border:1px solid #444;border-radius:6px;
    padding:5px 14px;font-size:12px;color:#888;cursor:pointer
    }
    
    #top{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:2rem;
    width:100%;
    max-width:860px
    }
    
    #dot{
    width:9px;height:9px;border-radius:50%;
    background:#333
    }
    
    #dot.listening{
    background:#00e5aa;
    box-shadow:0 0 8px #00e5aa88;
    animation:blink 1.8s infinite
    }
    
    #dot.thinking{
    background:#ffaa00;
    box-shadow:0 0 8px #ffaa0088;
    animation:blink .6s infinite
    }
    
    @keyframes blink{
    0%,100%{opacity:1}
    50%{opacity:.25}
    }
    
    #st{
    font-size:11px;
    color:#777;
    text-transform:uppercase
    }
    
    #mic-btn{
    margin-left:auto;
    border:none;
    color:white;
    padding:10px 22px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    font-weight:700;
    letter-spacing:.05em;
    transition:background .2s, box-shadow .2s, transform .15s;
    }
    
    #mic-btn.on{
    background:#e53935;
    box-shadow:0 4px 14px rgba(229,57,53,.5);
    }
    
    #mic-btn.off{
    background:#555;
    box-shadow:none;
    color:#888;
    }
    
    #mic-btn:hover{transform:scale(1.05)}
    
    #q-wrap{
    width:100%;max-width:860px;
    background:#282828;
    border:.5px solid #383838;
    border-radius:8px;
    padding:.75rem 1.25rem;
    margin-bottom:1.5rem;
    min-height:52px
    }
    
    #q-label{font-size:10px;color:#666;text-transform:uppercase;margin-bottom:4px}
    #q-txt{font-size:14px;color:#888;line-height:1.5}
    
    #a-wrap{
    width:100%;max-width:1100px;
    background:#232323;
    border:.5px solid #303030;
    border-radius:14px;
    min-height:280px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:2.5rem;
    margin-bottom:1.5rem
    }
    
    #a-ph{font-size:15px;color:#666;text-align:center}
    
    #a-txt{
    font-size:clamp(22px,3.5vw,40px);
    color:#ececec;
    line-height:1.6;
    text-align:center;
    display:none
    }
    
    #note{font-size:11px;color:#252525;text-align:center}
    #err{margin-top:.75rem;font-size:12px;color:#c0392b}
  </style>
</head>

<body>

<div id="key-wrap">
  <span id="key-label">Groq API key</span>
  <input id="key-input" type="password" placeholder="gsk_..." />
  <button id="key-save" onclick="saveKey()">зберегти</button>
</div>

<div id="top">
  <div id="dot"></div>
  <span id="st">введи ключ і збережи</span>
  <button id="mic-btn" class="on" onclick="toggleMic()">🎤 ON</button>
</div>

<div id="q-wrap">
  <div id="q-label">питання</div>
  <div id="q-txt">—</div>
</div>

<div id="a-wrap">
  <div id="a-ph">чекаю на питання...</div>
  <div id="a-txt"></div>
</div>

<div id="note">made by miraldi</div>
<div id="err"></div>

<script>
  let apiKey = localStorage.getItem('groq_key') || ''
  let rec = null
  let waiting = false
  let micEnabled = true
  let micStream = null

  if (apiKey) {
    document.getElementById('key-input').value = apiKey
    requestMicAndStart()
  }

  function saveKey() {
    apiKey = document.getElementById('key-input').value.trim()
    localStorage.setItem('groq_key', apiKey)
    requestMicAndStart()
  }

  async function requestMicAndStart() {
    if (!apiKey) return

    if (micStream) {
      startListening()
      return
    }

    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true })
      // закриваємо стрім — він потрібен лише щоб отримати дозвіл
      // на Android він конфліктує з Web Speech API якщо залишити відкритим
      micStream.getTracks().forEach(t => t.stop())
      startListening()
    } catch (e) {
      setStatus('', 'немає доступу до мікрофона')
      showErr('дозволь доступ до мікрофона в браузері')
    }
  }

  function setStatus(cls, txt) {
    document.getElementById('dot').className = cls
    document.getElementById('st').textContent = txt
  }

  function showErr(msg) {
    const el = document.getElementById('err')
    el.textContent = msg
    setTimeout(() => el.textContent = '', 4000)
  }

  function showAnswer(txt) {
    document.getElementById('a-ph').style.display = 'none'
    const el = document.getElementById('a-txt')
    el.style.display = 'block'
    el.textContent = txt
  }

  async function askGroq(question) {
    waiting = true
    setStatus('thinking', 'думаю...')

    try {
      const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + apiKey
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          max_tokens: 300,
          messages: [
            {
              role: 'system',
              content: 'Ти експерт з фармацевтичної хімії. Відповідай коротко 2-3 речення українською.'
            },
            { role: 'user', content: question }
          ]
        })
      })

      const data = await r.json()
      const ans = data.choices?.[0]?.message?.content || '...'
      showAnswer(ans)

    } catch (e) {
      showErr('помилка підключення')
    }

    waiting = false
    setStatus('listening', 'слухаю...')
  }

  function toggleMic() {
    micEnabled = !micEnabled
    const btn = document.getElementById('mic-btn')

    if (micEnabled) {
      btn.textContent = '🎤 ON'
      btn.className = 'on'
      setStatus('listening', 'слухаю...')
    } else {
      btn.textContent = '🎤 OFF'
      btn.className = 'off'
      setStatus('', 'мікрофон вимкнений')
    }
  }

  function startListening() {
    if (!apiKey) return

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition
    if (!SR) { setStatus('', 'потрібен Chrome'); return }

    if (rec) {
      try { rec.stop() } catch {}
      rec = null
    }

    rec = new SR()
    rec.lang = 'uk-UA'
    rec.interimResults = false
    rec.continuous = false   // continuous:true ламається на Android Chrome

    let restarting = false

    function scheduleRestart(delay) {
      if (restarting || !apiKey || !micEnabled) return
      restarting = true
      setTimeout(() => { restarting = false; startListening() }, delay || 400)
    }

    rec.onstart = () => setStatus('listening', 'слухаю...')

    rec.onresult = e => {
      if (!micEnabled) return
      const t = e.results[e.results.length - 1][0].transcript.trim()
      if (t && !waiting) {
        document.getElementById('q-txt').textContent = t
        askGroq(t)
      }
    }

    rec.onerror = e => {
      if (e.error === 'not-allowed') {
        setStatus('', 'доступ заблоковано')
        showErr('дозволь доступ до мікрофона в налаштуваннях браузера')
        return
      }
      // network/no-speech — тихий рестарт, onend може не спрацювати
      scheduleRestart(600)
    }

    rec.onend = () => {
      scheduleRestart(400)
    }

    rec.start()
  }
</script>

</body>
</html>
